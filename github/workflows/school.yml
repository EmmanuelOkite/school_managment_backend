name: NestJS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-node-version: '20' # Match your local Node version
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linters (Optional but recommended)
      run: npm run lint --if-present

    - name: Run Tests
      run: npm run test

    - name: Build Application
      run: npm run build

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  deploy:
    needs: build-and-test # Wait for CI to pass before deploying
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /var/www/my-nestjs-app
          git pull origin main
          npm install --production
          npm run build
          pm2 restart all # Assumes you use PM2 to keep the NestJS app running